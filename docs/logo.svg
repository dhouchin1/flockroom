<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none"
     font-family="system-ui, -apple-system, 'Segoe UI', Inter, sans-serif">

  <!-- ── icon (48×48, centered vertically) ─────────────────────── -->
  <g transform="translate(2, 2)">
    <!-- Room: rounded square outline with dark fill -->
    <rect x="0" y="0" width="48" height="48" rx="11"
          fill="#161922" stroke="#41c9be" stroke-width="2.5"/>

    <!-- Flock: 6 birds in loose diagonal swarm, large → tiny, lower-left → upper-right -->
    <!-- Each bird: M x-r,y  Q x,y-h  x+r,y  (arch curving upward) -->

    <!-- Bird 1 — large -->
    <path d="M 7 32  Q 12 27  17 32"
          stroke="#41c9be" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Bird 2 — large, upper cluster -->
    <path d="M 14 20  Q 19 15.5  24 20"
          stroke="#41c9be" stroke-width="2" stroke-linecap="round"/>
    <!-- Bird 3 — medium -->
    <path d="M 22 31  Q 26 27  30 31"
          stroke="#41c9be" stroke-width="1.7" stroke-linecap="round"/>
    <!-- Bird 4 — medium-small, high -->
    <path d="M 19 12  Q 23 8.5  27 12"
          stroke="#41c9be" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Bird 5 — small -->
    <path d="M 30 21  Q 33 18  36 21"
          stroke="#41c9be" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Bird 6 — tiny, deepest into room -->
    <path d="M 33 32  Q 35.5 29.5  38 32"
          stroke="#41c9be" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- ── wordmark ────────────────────────────────────────────────── -->
  <text x="62" y="33"
        font-size="22" font-weight="600" letter-spacing="-0.02em"
        fill="#e6e9ef">flockroom</text>
</svg>
